<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='utf-8'>
    <title>Debugger</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <div>
        <input name="url">
        <select name="method">
            <option>GET</option>
            <option>PUT</option>
            <option>POST</option>
            <option>DELETE</option>
        </select>
        <textarea name="header"></textarea>
        <textarea name="body"></textarea>
        <button id="bt-execute">execute</button>
    </div>
    <pre id="reponse">response goes here...</pre>
    <script>
        const elUrl = document.querySelector('[name="url"]')
        const elMethod = document.querySelector('[name="method"]')
        const elHeaders = document.querySelector('[name="headers"]')
        const elBody = document.querySelector('[name="body"]')
        const btExec = document.querySelector('#bt-execute')
        const elResponse = document.querySelector('#response')

        btExec.addEventListener('click', async () => {
            if (elUrl.value.trim() === '')
                return
            const request = await fetch(elUrl.value, {
                method: elMethod.value,
                //header: el.Headers,
                body: elBody.value
            })
            const response = await request .text()
            elResponse.innerHTML = response
        })
    </script>
</body>
</html>
